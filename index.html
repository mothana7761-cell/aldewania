<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Diwaniya Menu</title>

  <style>
    :root {
      --cream: #f5ead8;
      --card: #fff8ee;
      --brown: #3f2a1d;
      --light-brown: #8b5e3c;
      --gold: #b58a3b;
      --shadow: rgba(63, 42, 29, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--cream);
      color: var(--brown);
    }

    header {
      text-align: center;
      padding: 28px 16px 18px;
      background: var(--card);
      border-bottom: 1px solid rgba(63, 42, 29, 0.12);
    }

    .logo-img {
      width: 190px;
      max-width: 80%;
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .brand-title {
      font-size: 28px;
      font-weight: bold;
      margin: 5px 0;
      letter-spacing: 1px;
    }

    .brand-sub {
      font-size: 14px;
      color: var(--light-brown);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .lang-btn {
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--brown);
      padding: 9px 15px;
      border-radius: 22px;
      cursor: pointer;
      font-weight: bold;
    }

    .lang-btn.active {
      background: var(--brown);
      color: var(--card);
      border-color: var(--brown);
    }

    .search-wrap {
      max-width: 750px;
      margin: 16px auto 0;
      padding: 0 16px;
    }

    #searchInput {
      width: 100%;
      padding: 15px 18px;
      border-radius: 28px;
      border: 1px solid rgba(63, 42, 29, 0.2);
      background: #fff;
      font-size: 16px;
      outline: none;
    }

    .tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 14px;
      background: var(--brown);
      position: sticky;
      top: 0;
      z-index: 20;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tabs button {
      border: none;
      background: var(--card);
      color: var(--brown);
      padding: 11px 16px;
      border-radius: 25px;
      font-weight: bold;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .tabs button.active {
      background: var(--gold);
      color: #fff;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 22px 16px 80px;
    }

    .section {
      display: none;
      animation: fade 0.25s ease-in-out;
    }

    .section.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      text-align: center;
      font-size: 30px;
      margin: 20px 0 22px;
      color: var(--brown);
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .item {
      background: var(--card);
      padding: 17px;
      border-radius: 18px;
      box-shadow: 0 7px 20px var(--shadow);
      border: 1px solid rgba(63, 42, 29, 0.08);
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .item-name {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.35;
    }

    .item-price {
      font-size: 17px;
      font-weight: bold;
      color: #8b3a1d;
      white-space: nowrap;
    }

    .item-desc {
      margin-top: 8px;
      color: #76543f;
      line-height: 1.55;
      font-size: 14px;
    }

    .whatsapp {
      position: fixed;
      bottom: 18px;
      right: 18px;
      background: #25d366;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 14px 18px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      z-index: 50;
    }

    footer {
      text-align: center;
      padding: 35px 18px;
      background: var(--brown);
      color: var(--card);
    }

    footer span {
      color: var(--gold);
      font-weight: bold;
    }

    [dir="rtl"] .item-top {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .whatsapp {
      right: auto;
      left: 18px;
    }
  </style>
</head>

    let currentLang = "en";

    function renderMenu() {
      const tabs = document.getElementById("tabs");
      const menu = document.getElementById("menu");

      tabs.innerHTML = "";
      menu.innerHTML = "";

      menuData.forEach((section, index) => {
        const btn = document.createElement("button");
        btn.textContent = section.names[currentLang];
        btn.onclick = () => showSection(section.id, btn);

        if (index === 0) btn.classList.add("active");
        tabs.appendChild(btn);

        const sectionDiv = document.createElement("div");
        sectionDiv.className = "section" + (index === 0 ? " active" : "");
        sectionDiv.id = section.id;

        sectionDiv.innerHTML = `
          <h2 class="section-title">${section.names[currentLang]}</h2>
          <div class="items-grid">
            ${section.items.map(item => `
              <div class="item">
                <div class="item-top">
                  <div class="item-name">${item[currentLang]}</div>
                  <div class="item-price">${item.price}</div>
                </div>
                <div class="item-desc">${item.desc[currentLang]}</div>
              </div>
            `).join("")}
          </div>
        `;

        menu.appendChild(sectionDiv);
      });
    }

    function showSection(id, button) {
      document.querySelectorAll(".section").forEach(el => el.classList.remove("active"));
      document.getElementById(id).classList.add("active");

      document.querySelectorAll(".tabs button").forEach(el => el.classList.remove("active"));
      button.classList.add("active");
    }

    function setLang(lang, btn) {
      currentLang = lang;

      document.body.dir = lang === "ar" ? "rtl" : "ltr";

      document.querySelectorAll(".lang-btn").forEach(el => el.classList.remove("active"));
      btn.classList.add("active");

      renderMenu();
    }

    function searchItems() {
      const term = document.getElementById("searchInput").value.toLowerCase();

      document.querySelectorAll(".item").forEach(item => {
        const text = item.innerText.toLowerCase();
        item.style.display = text.includes(term) ? "block" : "none";
      });
    }

    renderMenu();
  </script>
