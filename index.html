<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Diwaniya Menu</title>

  <style>
    :root {
      --cream: #f4eadb;
      --card: #fff8ee;
      --brown: #3f2a1d;
      --brown2: #6f4a32;
      --gold: #b58a3b;
      --green: #25d366;
      --shadow: rgba(63, 42, 29, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--cream);
      color: var(--brown);
    }

    header {
      background: linear-gradient(rgba(63,42,29,.82), rgba(63,42,29,.72)),
        url("https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=1400&q=80");
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      padding: 35px 16px 45px;
    }

    .logo {
      width: 170px;
      max-width: 85%;
      border-radius: 18px;
      background: var(--card);
      padding: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
    }

    .title {
      font-size: 38px;
      margin: 18px 0 6px;
      color: #fff8ee;
    }

    .subtitle {
      color: #e8c987;
      font-size: 16px;
      letter-spacing: 2px;
    }

    .lang {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lang button {
      border: 1px solid #e8c987;
      background: rgba(255,255,255,.12);
      color: white;
      padding: 10px 16px;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
    }

    .lang button.active {
      background: var(--gold);
      border-color: var(--gold);
    }

    .search-box {
      max-width: 700px;
      margin: 22px auto 0;
    }

    .search-box input {
      width: 100%;
      padding: 15px 20px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 13px;
      background: var(--brown);
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tabs button {
      border: none;
      background: var(--card);
      color: var(--brown);
      padding: 11px 16px;
      border-radius: 25px;
      font-weight: bold;
      white-space: nowrap;
      cursor: pointer;
    }

    .tabs button.active {
      background: var(--gold);
      color: white;
    }

    main {
      max-width: 1050px;
      margin: auto;
      padding: 25px 15px 40px;
    }

    .section { display: none; }
    .section.active { display: block; }

    .section h2 {
      text-align: center;
      font-size: 32px;
      margin: 25px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 15px;
    }

    .item {
      background: var(--card);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 8px 22px var(--shadow);
      border: 1px solid rgba(63,42,29,.08);
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .item-name {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.35;
    }

    .price {
      color: #8b3a1d;
      font-weight: bold;
      white-space: nowrap;
    }

    .desc {
      margin-top: 8px;
      color: #76543f;
      line-height: 1.6;
      font-size: 14px;
    }

    .contact {
      background: var(--card);
      padding: 35px 16px;
      text-align: center;
    }

    .contact h2 {
      margin-top: 0;
      font-size: 30px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      max-width: 850px;
      margin: auto;
    }

    .btn {
      display: block;
      text-decoration: none;
      padding: 15px 18px;
      border-radius: 30px;
      font-weight: bold;
      color: white;
    }

    .call { background: var(--brown); }
    .wa { background: var(--green); }
    .review { background: var(--gold); }
    .map { background: var(--brown2); }
    .insta { background: #c13584; }

    .feedback {
      max-width: 700px;
      margin: 28px auto 0;
      background: #fff;
      padding: 18px;
      border-radius: 20px;
      box-shadow: 0 8px 22px var(--shadow);
    }

    .feedback textarea {
      width: 100%;
      height: 100px;
      border-radius: 15px;
      border: 1px solid #ddd;
      padding: 14px;
      font-size: 15px;
      resize: none;
      outline: none;
    }

    .feedback button {
      margin-top: 10px;
      width: 100%;
      border: none;
      background: var(--brown);
      color: white;
      padding: 14px;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      background: var(--brown);
      color: var(--card);
      text-align: center;
      padding: 28px 16px;
      line-height: 1.8;
    }

    footer strong { color: var(--gold); }

    .floating-wa {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: var(--green);
      color: white;
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 40px;
      font-weight: bold;
      box-shadow: 0 8px 25px rgba(0,0,0,.25);
      z-index: 100;
    }

    [dir="rtl"] .floating-wa {
      right: auto;
      left: 16px;
    }

    @media (max-width: 600px) {
      .title { font-size: 30px; }
      .section h2 { font-size: 27px; }
      header { padding-top: 25px; }
    }
  </style>
</head>

<body>
  <header>
    <img src="logo.jpeg" class="logo" alt="Al Diwaniya Logo" />
    <h1 class="title" id="mainTitle">Al Diwaniya</h1>
    <div class="subtitle" id="mainSub">Cafe • Restaurant • Shisha</div>

    <div class="lang">
      <button class="active" onclick="setLang('en', this)">English</button>
      <button onclick="setLang('ar', this)">العربية</button>
      <button onclick="setLang('tr', this)">Türkçe</button>
    </div>

    <div class="search-box">
      <input id="searchInput" oninput="searchItems()" placeholder="Search in menu..." />
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <main id="menu"></main>

  <section class="contact">
    <h2 id="contactTitle">Contact Us</h2>

    <div class="buttons">
      <a class="btn call" href="tel:+905313692933">📞 Call Us</a>
      <a class="btn wa" href="https://wa.me/905313692933" target="_blank">💬 WhatsApp</a>
      <a class="btn review" href="https://search.google.com/local/writereview?placeid=ChIJHQ8tjZi3yhQRETskn37Cy0Q&utm_source=chatgpt.com" target="_blank">⭐ Rate Us</a>
      <a class="btn map" href="https://www.google.com/maps/search/?api=1&query=Anfield+Cafe+Pub+Istanbul" target="_blank">📍 Find Us</a>
      <a class="btn insta" href="https://www.instagram.com/anfileld_cafepub" target="_blank">📸 Instagram</a>
    </div>

    <div class="feedback">
      <h3 id="feedbackTitle">Complaint / Suggestion / Compliment</h3>
      <textarea id="feedbackText" placeholder="Write your message here..."></textarea>
      <button onclick="sendFeedback()" id="feedbackBtn">Send Feedback on WhatsApp</button>
    </div>
  </section>

  <footer>
    <strong>Al Diwaniya</strong><br />
    Cafe & Restaurant<br />
    Istanbul, Turkey<br />
    +90 531 369 29 33
  </footer>

  <a class="floating-wa" href="https://wa.me/905313692933" target="_blank">WhatsApp</a>

    const menuData = [

          ["Turkish Breakfast", "فطور تركي", "Türk Kahvaltısı", "Traditional Turkish breakfast plate.", "طبق فطور تركي تقليدي.", "Geleneksel Türk kahvaltı tabağı.", "280₺"],
          ["Menemen", "مينيمن", "Menemen", "Turkish eggs with tomato and pepper.", "بيض تركي مع طماطم وفلفل.", "Domates ve biberli yumurta.", "140₺"],

        ]

      {

          ["Cheese Rolls", "رولات الجبنة", "Peynirli Börek", "Fried pastry with cheese.", "عجينة مقلية محشوة بالجبنة.", "Peynirli kızarmış börek.", "150₺"],
          ["Chicken Wings", "أجنحة دجاج", "Tavuk Kanat", "Served with sauce.", "تقدم مع الصوص.", "Sos ile servis edilir.", "220₺"]
        ]

      {

        items: [
          ["Hummus", "حمص", "Humus", "Classic chickpea dip.", "حمص كلاسيكي.", "Klasik nohut mezesi.", "120₺"],
          ["Mutabbal", "متبل", "Patlıcan Ezmesi", "Eggplant with tahini.", "باذنجان مع الطحينة.", "Tahinli patlıcan ezmesi.", "130₺"],
          ["Labneh", "لبنة", "Labne", "Creamy strained yogurt.", "لبنة كريمية.", "Süzme yoğurt.", "110₺"]
        ]
      },
      {
        id: "salads",
        names: { en: "Salads", ar: "السلطات", tr: "Salatalar" },
        items: [
          ["Caesar Salad", "سلطة سيزر", "Sezar Salata", "Lettuce, chicken, parmesan and sauce.", "خس، دجاج، بارميزان وصوص.", "Marul, tavuk, parmesan ve sos.", "240₺"],

          ["Chicken Burger", "برغر دجاج", "Tavuk Burger", "Crispy chicken burger.", "برغر دجاج مقرمش.", "Çıtır tavuk burger.", "290₺"]
        ]
      },
      {
        id: "pizza",
        names: { en: "Pizza & Pide", ar: "بيتزا وبيدا", tr: "Pizza ve Pide" },
        items: [
          ["Margherita Pizza", "بيتزا مارغريتا", "Margherita Pizza", "Mozzarella and tomato sauce.", "جبنة موزاريلا وصلصة طماطم.", "Mozzarella ve domates sosu.", "340₺"],
          ["Turkish Pide", "بيدا تركية", "Türk Pidesi", "Traditional Turkish pide.", "بيدا تركية تقليدية.", "Geleneksel Türk pidesi.", "300₺"]
        ]
      },
      {

          ["Mixed Grill", "مشاوي مشكلة", "Karışık Izgara", "Selection of grilled meats.", "تشكيلة من المشاوي.", "Karışık ızgara çeşitleri.", "650₺"],
          ["Grilled Chicken", "دجاج مشوي", "Izgara Tavuk", "Served with rice, salad and sauce.", "يقدم مع الأرز والسلطة والصوص.", "Pilav, salata ve sos ile.", "360₺"]
        ]
      },
      {
        id: "desserts",
        names: { en: "Desserts", ar: "الحلويات", tr: "Tatlılar" },
        items: [
          ["Kunafa", "كنافة", "Künefe", "Traditional sweet cheese dessert.", "حلوى الجبنة التقليدية.", "Geleneksel peynirli tatlı.", "180₺"],
          ["Baklava", "بقلاوة", "Baklava", "Turkish pistachio baklava.", "بقلاوة بالفستق.", "Fıstıklı baklava.", "170₺"]
        ]
      },
      {
        id: "coffee",
        names: { en: "Coffee", ar: "القهوة", tr: "Kahve" },
        items: [
          ["Turkish Coffee", "قهوة تركية", "Türk Kahvesi", "Traditional Turkish coffee.", "قهوة تركية تقليدية.", "Geleneksel Türk kahvesi.", "90₺"],
          ["Arabic Coffee", "قهوة عربية", "Arap Kahvesi", "Traditional Arabic coffee.", "قهوة عربية تقليدية.", "Geleneksel Arap kahvesi.", "100₺"],
          ["Espresso", "إسبريسو", "Espresso", "Strong Italian coffee.", "قهوة إيطالية قوية.", "Yoğun İtalyan kahvesi.", "95₺"],
          ["Latte", "لاتيه", "Latte", "Coffee with milk.", "قهوة مع الحليب.", "Sütlü kahve.", "120₺"]
        ]
      },
      {
        id: "drinks",
        names: { en: "Drinks", ar: "المشروبات", tr: "İçecekler" },
        items: [
          ["Soft Drinks", "مشروبات غازية", "Gazlı İçecekler", "Cola, Fanta, Sprite.", "كولا، فانتا، سبرايت.", "Kola, Fanta, Sprite.", "70₺"],
          ["Fresh Orange Juice", "عصير برتقال طازج", "Taze Portakal Suyu", "Freshly squeezed orange juice.", "عصير برتقال طازج.", "Taze sıkılmış portakal suyu.", "120₺"],
          ["Water", "ماء", "Su", "Still water.", "ماء.", "Su.", "35₺"]
        ]
      },
      {
        id: "shisha",
        names: { en: "Shisha", ar: "الأرجيلة", tr: "Nargile" },
        items: [
          ["Double Apple", "تفاحتين", "Çift Elma", "Classic flavor.", "النكهة الكلاسيكية.", "Klasik aroma.", "350₺"],
          ["Love 66", "لوف 66", "Love 66", "Popular mixed flavor.", "نكهة مميزة ومشهورة.", "Popüler karışık aroma.", "380₺"],
          ["Mint", "نعنع", "Nane", "Fresh mint flavor.", "نكهة نعنع منعشة.", "Ferah nane aroması.", "350₺"]
        ]
      },
      {
        id: "alcohol",
        names: { en: "Alcohol", ar: "مشروبات كحولية", tr: "Alkollü İçecekler" },
        items: [
          ["Beer", "بيرة", "Bira", "Ask staff for available brands.", "اسأل الموظف عن الأنواع المتوفرة.", "Mevcut markalar için personele sorunuz.", "Ask"],
          ["Wine", "نبيذ", "Şarap", "Ask staff for available options.", "اسأل الموظف عن الخيارات المتوفرة.", "Seçenekler için personele sorunuz.", "Ask"]
        ]
      }
    ];

    let currentLang = "en";

    function itemObj(arr) {
      return {
        en: arr[0], ar: arr[1], tr: arr[2],
        desc: { en: arr[3], ar: arr[4], tr: arr[5] },
        price: arr[6]
      };
    }

    function renderMenu() {
      const tabs = document.getElementById("tabs");
      const menu = document.getElementById("menu");
      tabs.innerHTML = "";
      menu.innerHTML = "";

      menuData.forEach((sec, i) => {
        const tab = document.createElement("button");
        tab.textContent = sec.names[currentLang];
        if (i === 0) tab.classList.add("active");
        tab.onclick = () => showSection(sec.id, tab);
        tabs.appendChild(tab);

        const section = document.createElement("section");
        section.className = "section" + (i === 0 ? " active" : "");
        section.id = sec.id;

        const items = sec.items.map(itemObj).map(item => `
          <div class="item">
            <div class="item-top">
              <div class="item-name">${item[currentLang]}</div>
              <div class="price">${item.price}</div>
            </div>
            <div class="desc">${item.desc[currentLang]}</div>
          </div>
        `).join("");

        section.innerHTML = `
          <h2>${sec.names[currentLang]}</h2>
          <div class="grid">${items}</div>
        `;

        menu.appendChild(section);
      });

      searchItems();
    }

    function showSection(id, btn) {
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    function setLang(lang, btn) {
      currentLang = lang;
      document.body.dir = lang === "ar" ? "rtl" : "ltr";

      document.querySelectorAll(".lang button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      document.getElementById("mainTitle").textContent = ui[lang].title;
      document.getElementById("mainSub").textContent = ui[lang].sub;
      document.getElementById("searchInput").placeholder = ui[lang].search;
      document.getElementById("contactTitle").textContent = ui[lang].contact;
      document.getElementById("feedbackTitle").textContent = ui[lang].feedback;
      document.getElementById("feedbackText").placeholder = ui[lang].placeholder;
      document.getElementById("feedbackBtn").textContent = ui[lang].send;

      renderMenu();
    }

    function searchItems() {
      const term = document.getElementById("searchInput").value.toLowerCase();
      document.querySelectorAll(".item").forEach(item => {
        item.style.display = item.innerText.toLowerCase().includes(term) ? "block" : "none";
      });
    }

    function sendFeedback() {
      const text = document.getElementById("feedbackText").value || "Hello Al Diwaniya, I would like to send feedback about my experience.";
      const url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(text);
      window.open(url, "_blank");
    }

    renderMenu();
  </script>
</body>
</html>
